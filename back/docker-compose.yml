services:
  postgres:
    image: postgres:16-alpine
    container_name: supfile_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: supfile
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supfile"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: supfile_api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:root@postgres:5432/supfile
      FILES_PATH: /app/files
      JWT_SECRET: change-me-in-production
    volumes:
      - ./storage/files:/app/files
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: supfile_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini dans le fichier .env}
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-supfile}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./back
    container_name: supfile_api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini dans le fichier .env}@postgres:5432/${POSTGRES_DB:-supfile}
      FILES_PATH: /app/files
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET doit etre defini dans le fichier .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./back/storage/files:/app/files
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build: ./front
    container_name: supfile_front
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
